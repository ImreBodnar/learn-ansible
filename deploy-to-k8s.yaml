---
- name: Deploy app in new namespace
  hosts: localhost
  tasks:
    - name: Create k8s namespace
      kubernetes.core.k8s:
        name: my-app
        api_version: v1
        kind: Namespace
        state: present
        # kubeconfig: ~/.kube/config
    - name: Deploy nginx app
      kubernetes.core.k8s:
        src: nginx-config.yaml
        state: present
        # kubeconfig: ~/.kube/config
        namespace: my-app