---
- name: Install Java and net-tools
  hosts: ec2_ubuntu
  become: true
  tasks:
    - name: Update apt repo & cache
      apt: update_cache=yes force_apt_get=yes cache_valid_time=3600
    - name: Install Java 8
      apt: name=openjdk-8-jre-headless
    - name: Install net-tools
      apt: name=net-tools

- name: Donwload and unpack Nexus installer
  hosts: ec2_ubuntu
  become: true
  tasks:
    - name: Check Nexus folder stats
      stat:
        path: /opt/nexus
      register: stat_result
    - name: Download Nexus
      get_url:
        url: https://download.sonatype.com/nexus/3/latest-linux-x86_64.tar.gz
        dest: /opt/
      register: download_result
    - name: Unpack Nexus installer
      unarchive:
        src: "{{download_result.dest}}"
        dest: /opt/
        remote_src: yes
      when: not stat_result.stat.exists
    - name: Find Nexus folder
      find:
        paths: /opt
        pattern: "nexus-*"
        file_type: directory
      register: find_result
    - name: Rename Nexus folder
      shell: mv {{find_result.files[0].path}} /opt/nexus
      when: not stat_result.stat.exists

- name: Create Nexus user
  hosts: ec2_ubuntu
  become: true
  tasks:
    - name: Ensure group nexus exists
      group:
        name: nexus
        state: present
    - name: Create Nexus user
      user:
        name: nexus
        group: nexus
    - name: Make Nexus user owner of nexus folder
      file:
        path: /opt/nexus
        state: directory
        owner: nexus
        group: nexus
        recurse: yes
    - name: Make Nexus user owner of sonatype-work folder
      file:
        path: /opt/sonatype-work
        state: directory
        owner: nexus
        group: nexus
        recurse: yes

- name: Install ACL
  hosts: ec2_ubuntu
  become: true
  tasks:
    - name: Install ACL
      apt: name=acl

- name: Start Nexus with nexus user
  hosts: ec2_ubuntu
  become: true
  become_user: nexus
  tasks:
    - name: Set run_as_user nexus
      blockinfile:
        path: /opt/nexus/bin/nexus.rc
        create: true
        block: |
          run_as_user="nexus"
    - name: Start Nexus
      command: /opt/nexus/bin/nexus start

- name: Verify Nexus is running
  hosts: ec2_ubuntu
  tasks:
    - name: Status check with ps
      shell: ps aux | grep nexus
      register: app_status
    - debug: msg={{app_status.stdout_lines}}
    - name: Wait some time
      pause:
        minutes: 1
    - name: Status check with netstat
      shell: netstat -plnt
      register: app_status
    - debug: msg={{app_status.stdout_lines}}